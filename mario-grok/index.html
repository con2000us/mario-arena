<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMB World 1-1 — Pixel Behavior Remake</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #5c94fc;
        font-family: "Courier New", Courier, monospace;
        color: #1a1a1a;
      }
      #app {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 16px;
        background: linear-gradient(#5c94fc 0%, #5c94fc 55%, #00a800 55%, #00a800 100%);
      }
      h1 {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0.04em;
        text-shadow: 1px 1px 0 #fff;
      }
      #game-wrap {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        border: 4px solid #1a1a1a;
        background: #000;
        box-shadow: 0 8px 0 rgba(0, 0, 0, 0.25);
      }
      canvas {
        display: block;
        width: 768px;
        height: 720px;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        background: #5c94fc;
      }
      .help {
        max-width: 768px;
        font-size: 13px;
        line-height: 1.5;
        background: rgba(255, 255, 255, 0.85);
        padding: 10px 14px;
      }
      kbd {
        background: #eee;
        border: 1px solid #999;
        border-bottom-width: 2px;
        border-radius: 3px;
        padding: 0 4px;
      }
      @media (max-width: 820px) {
        canvas {
          width: min(100vw - 32px, 512px);
          height: auto;
          aspect-ratio: 256 / 240;
        }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-CSuPRJAb.js"></script>
  </head>
  <body>
    <div id="app">
      <h1>SUPER MARIO BROS — WORLD 1-1</h1>
      <div id="game-wrap">
        <canvas id="game" width="256" height="240" aria-label="Game canvas"></canvas>
      </div>
      <div class="help">
        <div><kbd>←</kbd>/<kbd>→</kbd> 或 <kbd>A</kbd>/<kbd>D</kbd> 移動 · <kbd>Z</kbd>/<kbd>S</kbd>/<kbd>Shift</kbd> 跑步 · <kbd>X</kbd>/<kbd>K</kbd>/<kbd>Space</kbd> 跳躍 · <kbd>↓</kbd> 進水管</div>
        <div>目標：像素級／幀級行為還原（物理對齊 smbdis）。通關旗杆即完成 1-1。</div>
      </div>
    </div>
  </body>
</html>
