<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="Clean-room HTML5 Canvas recreation of a classic 8-bit platform stage.">
  <link rel="icon" href="data:,">
  <title>World 1-1 — HTML5 Clean-room Recreation</title>
  <link rel="stylesheet" href="style.css?v=20260720-final">
</head>
<body>
  <main id="app">
    <section id="console" aria-label="HTML5 遊戲">
      <canvas id="game" width="256" height="240" tabindex="0"
              aria-label="World 1-1 遊戲畫面；按 Enter 或點擊畫面開始"></canvas>

      <div id="touch-ui" aria-label="觸控控制器">
        <div class="dpad" aria-label="方向鍵">
          <button class="pad left" data-key="ArrowLeft" aria-label="向左">◀</button>
          <button class="pad down" data-key="ArrowDown" aria-label="向下">▼</button>
          <button class="pad right" data-key="ArrowRight" aria-label="向右">▶</button>
        </div>
        <div class="system-buttons">
          <button class="mini" id="mute-button" type="button">SOUND</button>
          <button class="mini" data-key="Enter" type="button">START</button>
        </div>
        <div class="action-buttons" aria-label="動作鍵">
          <button class="action b" data-key="KeyX" aria-label="B：跑步與火球">B</button>
          <button class="action a" data-key="KeyZ" aria-label="A：跳躍">A</button>
        </div>
      </div>
    </section>

    <p id="hint">
      ← → 移動　↓ 入管　Z／Space 跳躍　X／Shift 跑步・火球　Enter 暫停　M 靜音
    </p>
    <p id="notice">Clean-room fan recreation · No ROM, ripped graphics, or recorded game audio included.</p>
  </main>

  <script src="js/sprites.js?v=20260720-final"></script>
  <script src="js/audio.js?v=20260720-final"></script>
  <script src="js/levels.js?v=20260720-final"></script>
  <script src="js/game.js?v=20260720-final"></script>
</body>
</html>
